name: Pytest

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

env:
  COMFYUI_UML_PYTEST: "1"

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Sync dev environment
        run: uv sync --extra dev

      - name: Ruff check
        run: uv run ruff check .

      - name: Run pytest
        run: uv run pytest -q --tb=short

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/js/package-lock.json

      - name: npm ci (web/js local Mermaid)
        working-directory: web/js
        run: npm ci
