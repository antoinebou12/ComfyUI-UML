# Keep [test.workflows].cpu in sync with [tool.comfy-test.workflows].cpu in pyproject.toml.
[test]
# Test levels: syntax -> install -> registration -> instantiation -> static_capture -> validation -> execution
levels = [
  "syntax",
  "install",
  "registration",
  "instantiation",
  "static_capture",
  "validation",
  "execution",
]
publish = true

[test.workflows]
timeout = 300
# All workflows: diagram-only and diagram+viewer (no LLM). LLM workflow is mocked in Actions (GITHUB_ACTIONS); see docs/Testing.md.
cpu = [
  "uml_single_diagram_only.json",
  "uml_single_node.json",
  "uml_mermaid.json",
  "uml_plantuml.json",
  "uml_llm_ollama.json",
]

[test.platforms]
linux = true
macos = true
windows = true
windows_portable = true
