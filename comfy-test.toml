# Keep [test.workflows].cpu in sync with [tool.comfy-test.workflows].cpu in pyproject.toml.
[test]
# Test levels: syntax -> install -> registration -> instantiation -> static_capture -> validation -> execution
levels = [
  "syntax",
  "install",
  "registration",
  "instantiation",
  "static_capture",
  "validation",
  "execution",
]
publish = true

[test.workflows]
timeout = 300
# Diagram-only and diagram+viewer (Mermaid, PlantUML). LLM example lives in workflows/ but is not in this list; see docs/Testing.md.
cpu = [
  "uml_single_diagram_only.json",
  "uml_single_node.json",
  "uml_mermaid.json",
  "uml_plantuml.json",
]

[test.platforms]
linux = true
macos = true
windows = true
windows_portable = true
linux_gpu = false
windows_gpu = false
windows_portable_gpu = false
